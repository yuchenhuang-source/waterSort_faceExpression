<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Bridge - Live View</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>CV Bridge</h1>
      <div class="status" id="status">Disconnected</div>
    </header>
    <main>
      <div class="frame-container">
        <img id="frame" alt="Latest frame from game" />
        <canvas id="overlay"></canvas>
      </div>
      <aside>
        <section>
          <h2>Stats</h2>
          <div id="stats">-</div>
        </section>
        <section>
          <h2>Detections</h2>
          <p class="hint">Use <code>?cv=1&auto=1</code> for auto frames, or press <strong>S</strong> in the game for manual step.</p>
          <div id="detection-summary" class="detection-summary" role="status" aria-live="polite">-</div>
          <pre id="detections">Waiting for frames...</pre>
        </section>
      </aside>
    </main>
  </div>
  <script src="app.js?v=detection-summary"></script>
</body>
</html>
